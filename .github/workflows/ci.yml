# nlqdb — CI. Runs on every PR and every push to main.
#
# Philosophy (DESIGN §13.2): lefthook is the first line of defence;
# CI is the backstop. Jobs are ordered cheapest-signal-first so a
# broken Biome rule fails in 10s, not after a full test run.
#
# Eventually this file becomes a 4-line consumer of `nlqdb/actions@v1`
# (DESIGN §13) once that repo exists. Until then the workflow is
# inlined here.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-js:
    name: Biome (JS/TS/JSON/CSS)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run check

  lint-go:
    name: Go (gofumpt + vet + golangci-lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: hashFiles('cli/go.mod') != ''
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          diff <(gofumpt -d .) <(echo -n) || {
            echo "::error::gofumpt found unformatted files — run 'bun run check:go' locally"
            exit 1
          }

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: cli
          version: latest

      - name: go test
        run: go test ./... -race -count=1

  lint-py:
    name: ruff (format + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('pyproject.toml') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: ruff format --check
        run: uv run ruff format --check

      - name: ruff check
        run: uv run ruff check

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
