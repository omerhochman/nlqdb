# nlqdb — CI. Runs on every PR and every push to main.
#
# Philosophy (DESIGN §13.2): lefthook is the first line of defence;
# CI is the backstop. Jobs are ordered cheapest-signal-first so a
# broken Biome rule fails in 10s, not after a full test run.
#
# `hashFiles()` is intentionally NOT used at job-level `if:` — GitHub
# Actions only allows it in step-level expressions, not job-level
# conditionals. Where a job is gated on a file existing, we run a
# `precheck` step that sets an output, then guard later steps on it.
#
# Eventually this file becomes a 4-line consumer of `nlqdb/actions@v1`
# (DESIGN §13) once that repo exists. Until then the workflow is
# inlined here.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-js:
    name: Biome (JS/TS/JSON/CSS)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run check

  lint-go:
    name: Go (gofumpt + vet + golangci-lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - id: precheck
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f cli/go.mod ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::cli/go.mod not present — Go toolchain hasn't landed yet, skipping."
          fi

      - if: steps.precheck.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: gofumpt
        if: steps.precheck.outputs.exists == 'true'
        run: |
          go install mvdan.cc/gofumpt@latest
          diff <(gofumpt -d .) <(echo -n) || {
            echo "::error::gofumpt found unformatted files — run 'bun run check:go' locally"
            exit 1
          }

      - name: go vet
        if: steps.precheck.outputs.exists == 'true'
        run: go vet ./...

      - name: golangci-lint
        if: steps.precheck.outputs.exists == 'true'
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: cli
          version: latest

      - name: go test
        if: steps.precheck.outputs.exists == 'true'
        run: go test ./... -race -count=1

  lint-py:
    name: ruff (format + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - id: precheck
        run: |
          if [ -f pyproject.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml not present — Python toolchain hasn't landed yet, skipping."
          fi

      - if: steps.precheck.outputs.exists == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: ruff format --check
        if: steps.precheck.outputs.exists == 'true'
        run: uv run ruff format --check

      - name: ruff check
        if: steps.precheck.outputs.exists == 'true'
        run: uv run ruff check

  test-api:
    name: apps/api (typecheck + vitest + wrangler dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: apps/api
        run: bun run typecheck

      - name: Test
        working-directory: apps/api
        run: bun run test

      - name: Wrangler build (dry-run)
        working-directory: apps/api
        run: bun run build

  test-pkgs:
    name: packages/${{ matrix.pkg }} (typecheck + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        pkg: [db, llm, otel]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: packages/${{ matrix.pkg }}
        run: bun run typecheck

      - name: Test
        working-directory: packages/${{ matrix.pkg }}
        run: bun run test

  build-web:
    name: apps/web (astro check + build)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Astro check
        working-directory: apps/web
        run: bun run check

      - name: Astro build
        working-directory: apps/web
        run: bun run build

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  lockfile-guard:
    name: lockfile guard (forbidden direct deps)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/lockfile-guard.sh
