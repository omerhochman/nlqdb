# CLA Assistant Lite — gates pull-requests on a signed Contributor
# Licence Agreement. Runs entirely inside our GitHub org (no
# third-party SaaS); signatures are stored as a JSON file in a
# private `cla-signatures` repo we control, which keeps signer data
# under our jurisdiction (relevant for FADP/GDPR).
#
# Setup steps the first time this lands (one-time founder action):
#   1. Create a *private* repo `nlqdb/cla-signatures` (empty, default branch `main`).
#   2. Generate a fine-grained PAT with `contents:write` scope on
#      `nlqdb/cla-signatures` only. Add it to this repo's Actions
#      secrets as `CLA_PAT`.
#   3. Merge this workflow. The bot will start commenting on PRs.

name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/nlqdb/nlqdb/blob/main/CLA.md'
          branch: 'main'
          allowlist: dependabot[bot],renovate[bot],github-actions[bot]
          remote-organization-name: nlqdb
          remote-repository-name: cla-signatures
          create-file-commit-message: 'chore(cla): create signatures store'
          signed-commit-message: 'chore(cla): record $contributorName signed CLA'
          custom-notsigned-prcomment: |
            Thanks for the contribution! Before we can merge, you need to
            sign the [Contributor License Agreement](https://github.com/nlqdb/nlqdb/blob/main/CLA.md).

            Reply to this comment with the exact phrase below to sign:

            > I have read the CLA Document and I hereby sign the CLA

            You only sign once — the CLA covers all your future PRs.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'CLA signed by all contributors. Thanks!'
