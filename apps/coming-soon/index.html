<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0b10" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)" />

    <title>nlqdb — a database you talk to</title>
    <meta name="description" content="A database you talk to. Create one, query it in English. The infrastructure is invisible." />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="nlqdb — a database you talk to" />
    <meta property="og:description" content="Create a database with a word. Query it in English. The infrastructure is invisible." />
    <meta property="og:url" content="https://nlqdb.com" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <div class="stack">
        <h1 aria-label="nlqdb">
          <span class="wordmark">nlqdb</span>
        </h1>

        <p class="tagline">A database you talk to.</p>

        <p class="lede">
          Create one with a word. Query it in English. Schema, indexes, backups,
          and engine choice stay invisible — unless you want to see them.
        </p>

        <p class="status" role="status">
          <span class="dot" aria-hidden="true"></span>
          Pre-alpha.
        </p>

        <nav class="actions" aria-label="Contact and links">
          <a class="button button--primary" href="mailto:hello@nlqdb.com">
            hello@nlqdb.com
          </a>
        </nav>
      </div>
    </main>

    <footer>
      <p>
        <a href="/privacy">Privacy</a> &middot;
        <a href="/terms">Terms</a>
      </p>
    </footer>
  </body>
</html>
