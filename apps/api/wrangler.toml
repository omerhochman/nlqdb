name = "nlqdb-api"
main = "src/index.ts"
compatibility_date = "2026-04-25"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Public, non-secret config. NODE_ENV switches Better Auth between the
# `OAUTH_GITHUB_*` (prod) and `OAUTH_GITHUB_*_DEV` (Wrangler dev) credential
# pairs at module load (apps/api/src/auth.ts). `wrangler dev` overrides this
# to "development" via .dev.vars (gitignored; copy from .dev.vars.example).
[vars]
NODE_ENV = "production"

# Resources provisioned by `scripts/provision-cf-resources.sh`. The
# script fills in resolved IDs idempotently — IDs are public identifiers
# (account-scoped), not secrets, and are committed for deterministic
# `wrangler dev` + CI builds.
#
# R2 (`nlqdb-assets`) is deferred — needs a one-time click to enable on
# the Cloudflare dashboard. Will land when blob storage is exercised.

[[kv_namespaces]]
binding = "KV"
id = "5b086b03ead54f508271f31fc421bbaa"

[[d1_databases]]
binding = "DB"
database_name = "nlqdb-app"
database_id = "98767eb0-65df-4787-87bf-c3952d851b29"
migrations_dir = "migrations"

# `custom_domain = true` (vs `pattern + zone_name`) gives the worker
# exclusive ownership of `app.nlqdb.com` and lets wrangler create the
# DNS record + provision the cert on first deploy. OAuth callbacks in
# RUNBOOK §5/§5b are registered against this hostname.
[[routes]]
pattern = "app.nlqdb.com"
custom_domain = true
